<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>サポート - ZEC Inc.</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style>
    :root {
      --bg: #f5f8ff;
      --card: #ffffff;
      --text: #1e293b;
      --muted: #64748b;
      --line: #e2e8f0;
      --accent: #2563eb;
      --header: #2c3e50;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }

    .wrap {
      max-width: 820px;
      margin: 0 auto;
      padding: 48px 20px;
    }

    .card {
      background: var(--card);
      border-radius: 12px;
      padding: 40px 32px;
      border: 1px solid var(--line);
      box-shadow: 0 10px 30px rgba(37, 99, 235, 0.08);
    }

    .eyebrow {
      color: var(--accent);
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 34px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .lead {
      color: var(--muted);
      margin: 0 0 28px;
    }

    .box {
      background: #f0f6ff;
      border: 1px solid #dbeafe;
      padding: 18px;
      border-radius: 10px;
    }

    a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    a:hover {
      text-decoration: underline;
    }

    .footer {
      margin-top: 32px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
      font-size: 14px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <div class="eyebrow">ZEC Inc.</div>
      <h1>サポート</h1>
      <p class="lead">当社のアプリケーションおよびツールに関するお問い合わせは、以下のメールアドレスまでご連絡ください。</p>
      <p class="lead">For questions or support regarding our applications and tools, please contact us below.</p>

      <div class="box">
        <p>Email: <a href="mailto:support@zec-inc.jp">support@zec-inc.jp</a></p>
      </div>

      <div class="footer">
        <a href="/">トップページへ戻る</a>
        <span aria-hidden="true"> · </span>
        <a href="/privacy.html">プライバシーポリシー</a>
        <div>&copy; 2026 ZEC Inc.</div>
      </div>
    </section>
  </main>
</body>
</html>
