<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Support - ZEC Inc.</title>
  <style>
    :root {
      --bg: #f7f8fa;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --accent: #111827;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }

    .wrap {
      max-width: 820px;
      margin: 0 auto;
      padding: 48px 20px 80px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 40px 32px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 12px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 36px;
      line-height: 1.2;
      color: var(--accent);
    }

    .lead {
      margin: 0 0 28px;
      font-size: 17px;
      color: var(--muted);
    }

    p {
      margin: 0 0 16px;
      font-size: 16px;
    }

    .contact-box {
      margin-top: 24px;
      padding: 18px 20px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fafafa;
    }

    .label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .footer {
      margin-top: 32px;
      padding-top: 20px;
      border-top: 1px solid var(--line);
      font-size: 14px;
      color: var(--muted);
    }

    a {
      color: #2563eb;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    @media (max-width: 640px) {
      .wrap {
        padding: 24px 14px 48px;
      }

      .card {
        padding: 28px 20px;
        border-radius: 14px;
      }

      h1 {
        font-size: 28px;
      }

      .lead,
      p {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <span class="eyebrow">ZEC Inc.</span>
      <h1>Support</h1>
      <p class="lead">
        For questions, bug reports, or support inquiries regarding applications and tools provided by ZEC Inc., please contact us below.
      </p>

      <div class="contact-box">
        <span class="label">Contact</span>
        <p>
          Email: <a href="mailto:info@zec-inc.jp">support@zec-inc.jp</a>
        </p>
      </div>

      <div class="footer">
        © ZEC Inc. All rights reserved.
      </div>
    </section>
  </main>
</body>
</html>
