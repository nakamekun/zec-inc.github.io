<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Support - ZEC Inc.</title>
  <style>
    :root {
      --bg: #f5f8ff;
      --card: #ffffff;
      --text: #1e293b;
      --muted: #64748b;
      --line: #e2e8f0;
      --accent: #2563eb;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 820px;
      margin: 0 auto;
      padding: 48px 20px;
    }

    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 40px;
      border: 1px solid var(--line);
      box-shadow: 0 10px 30px rgba(37, 99, 235, 0.08);
    }

    .eyebrow {
      color: var(--accent);
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 34px;
      margin-bottom: 16px;
    }

    .lead {
      color: var(--muted);
      margin-bottom: 28px;
    }

    .box {
      background: #f0f6ff;
      border: 1px solid #dbeafe;
      padding: 18px;
      border-radius: 12px;
    }

    a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    a:hover {
      text-decoration: underline;
    }

    .footer {
      margin-top: 32px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
      font-size: 14px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <div class="eyebrow">ZEC Inc.</div>
      <h1>Support</h1>
      <p class="lead">
        For questions or support regarding our applications and tools, please contact us below.
      </p>

      <div class="box">
        <p>Email: <a href="mailto:support@zec-inc.jp">support@zec-inc.jp</a></p>
      </div>

      <div class="footer">
        © ZEC Inc.
      </div>
    </section>
  </main>
</body>
</html>
