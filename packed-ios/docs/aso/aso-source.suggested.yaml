        - term: "持ち物リスト"
          priority: 29
          source: "locale-seed"
        - term: "忘れ物防止"
          priority: 49
          source: "aso-source"
        - term: "パッキングリスト"
          priority: 49
          source: "locale-seed"
        - term: "出張 持ち物"
          priority: 49
          source: "locale-seed"
        - term: "旅行準備"
          priority: 49
          source: "locale-seed"
        - term: "子連れ旅行 持ち物"
          priority: 50
          source: "locale-seed"
        - term: "旅行チェックリスト"
          priority: 50
          source: "locale-seed"
      competitors:
        - "PackPoint"
        - "Packr"
    metadata:
      name: "Packed"
      subtitle: "出張・子連れ旅行・持ち物リスト"
      promotional_text: "旅行や出張の持ち物をリスト化。出発前に準備できたものをすばやく確認できます。"
      description: |
        Packedのlocale別ASO提案です。
        
        主な内容:
        - このlocaleの検索意図に合わせたtitle/subtitle/keywords
        - 自然な表現と検索語の両立
        - base localeの直訳ではなく、機能意味と禁止表現を保った再設計
        
        説明文は、実際の機能、スクリーンショット、App Review上の安全な表現に合わせて人間が最終確認してください。
        
