      - "出張の持ち物を確認したい"
      - "子連れ旅行の準備をリスト化したい"
      - "日本語では「持ち物リスト」「旅行準備」「旅行チェックリスト」のように、 旅行前の不安や忘れ物防止の意図で検索されやすい。en-USの直訳ではなく、 出張や子連れ旅行など日本語で自然な検索語をkeywordsで広く拾う。"
    research:
      search_intent: |
        このlocaleの主要カテゴリ語と用途語で探すユーザー。
      keyword_candidates:
        - term: "出張"
          priority: 29
          source: "aso-source"
        - term: "子連れ旅行"
