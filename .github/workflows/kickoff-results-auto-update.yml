name: Kickoff Results Auto Update

on:
  schedule:
    # Stagger away from minute 0, where GitHub Actions scheduled workflows are most likely to be delayed or dropped.
    - cron: "7,17,27,37,47,57 * * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force result checks even for finished matches"
        required: false
        default: "false"
      trigger_source:
        description: "Caller identifier for monitoring"
        required: false
        default: "manual"

permissions:
  contents: write

concurrency:
  group: kickoff-results-auto-update
  cancel-in-progress: false

jobs:
  update-results:
    runs-on: ubuntu-latest
    env:
      AUTO_UPDATE_ENABLED: ${{ vars.KICKOFF_AUTO_UPDATE_ENABLED || 'false' }}
      PYTHONDONTWRITEBYTECODE: "1"
      SUMMARY_JSON: /tmp/kickoff-auto-update-summary.json
      TRIGGER_SOURCE: ${{ github.event_name == 'schedule' && 'github-schedule' || github.event.inputs.trigger_source || 'manual' }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check auto update switch
        if: env.AUTO_UPDATE_ENABLED != 'true'
        run: |
          echo "KICKOFF_AUTO_UPDATE_ENABLED is not true; skipping scheduled update." >> "$GITHUB_STEP_SUMMARY"

      - name: Run scheduled updater
        if: env.AUTO_UPDATE_ENABLED == 'true'
        working-directory: tools/kickoff-2026/results
        run: |
          FORCE_ARG=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FORCE_ARG="--force"
          fi
          python3 scripts/results/auto_update_results.py ${FORCE_ARG} --summary-json "$SUMMARY_JSON"

      - name: Test generated JSON and tools
        if: env.AUTO_UPDATE_ENABLED == 'true'
        working-directory: tools/kickoff-2026/results
        run: |
          python3 -m json.tool data/generated/matchResults.json >/dev/null
          python3 -m json.tool data/generated/groupStandings.json >/dev/null
          python3 -m json.tool ../../..//data/kickoff-2026/matchResults.json >/dev/null
          python3 -m json.tool ../../..//data/kickoff-2026/groupStandings.json >/dev/null
          python3 -m unittest discover -s tests -p 'test_*.py'

      - name: Clean Python bytecode caches
        if: env.AUTO_UPDATE_ENABLED == 'true'
        run: |
          find tools/kickoff-2026/results -type d -name "__pycache__" -prune -exec rm -rf {} +

      - name: Deploy public JSON
        if: env.AUTO_UPDATE_ENABLED == 'true'
        working-directory: tools/kickoff-2026/results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          python3 scripts/results/deploy_generated_results.py --copy-only --no-curl

      - name: Commit public JSON and tool state
        if: env.AUTO_UPDATE_ENABLED == 'true'
        run: |
          git add data/kickoff-2026/matchResults.json \
            data/kickoff-2026/groupStandings.json \
            tools/kickoff-2026/results/data/results/manual-match-results.json \
            tools/kickoff-2026/results/data/results/auto-update-state.json \
            tools/kickoff-2026/results/data/generated/matchResults.json \
            tools/kickoff-2026/results/data/generated/groupStandings.json
          if git diff --cached --quiet; then
            echo "No JSON or tool state changes to commit."
          else
            if git diff --cached --name-only | grep -q '^data/kickoff-2026/'; then
              git commit -m "Update Kickoff 2026 results and group standings"
            else
              git commit -m "Update Kickoff 2026 auto result state"
            fi
          fi

      - name: Notify monitoring events
        if: env.AUTO_UPDATE_ENABLED == 'true' && always()
        continue-on-error: true
        working-directory: tools/kickoff-2026/results
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.KICKOFF_DISCORD_WEBHOOK_URL }}
        run: |
          if [ -f "$SUMMARY_JSON" ]; then
            python3 scripts/results/notify_auto_update.py --summary-json "$SUMMARY_JSON" --trigger-source "$TRIGGER_SOURCE"
          else
            echo "No summary JSON available; notification skipped."
          fi

      - name: Push changes
        if: env.AUTO_UPDATE_ENABLED == 'true'
        run: |
          LOCAL_HEAD="$(git rev-parse HEAD)"
          UPSTREAM_HEAD="$(git rev-parse @{u})"
          if [ "$LOCAL_HEAD" = "$UPSTREAM_HEAD" ]; then
            echo "No commits to push."
          else
            git push
          fi
